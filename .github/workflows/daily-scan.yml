name: סריקה יומית

on:
  schedule:
    # כל יום בשעה 06:00 UTC = 09:00 בישראל (08:00 בשעון חורף)
    - cron: '0 6 * * *'
  workflow_dispatch: # אפשרות להריץ ידנית

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Restore baseline screenshots
        uses: actions/cache@v4
        with:
          path: screenshots/baseline
          key: baselines-${{ github.repository }}

      - name: Run daily scan
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: npm run scan:daily

      - name: Save baseline cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: screenshots/baseline
          key: baselines-${{ github.repository }}-${{ github.run_id }}

      - name: Upload screenshots as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-screenshots-${{ github.run_number }}
          path: screenshots/
          retention-days: 7
