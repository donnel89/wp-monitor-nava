name: סריקה יומית

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Restore baseline screenshots
        uses: actions/cache@v4
        with:
          path: screenshots/baseline
          key: baselines-${{ github.repository }}

      - name: Run daily scan
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: npm run scan:daily

      - name: Save baseline cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: screenshots/baseline
          key: baselines-${{ github.repository }}-${{ github.run_id }}

      - name: Upload screenshots as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-screenshots-${{ github.run_number }}
          path: screenshots/
          retention-days: 7

      - name: Commit results to repo
        if: always()
        run: |
          git config user.name "WP Monitor Bot"
          git config user.email "monitor@github.com"
          git add results/
          git diff --staged --quiet || git commit -m "📊 תוצאות סריקה יומית $(date '+%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
