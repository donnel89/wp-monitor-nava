name: סריקה שבועית

on:
  schedule:
    # כל יום ראשון בשעה 05:00 UTC
    - cron: '0 5 * * 0'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Restore baseline screenshots
        uses: actions/cache@v4
        with:
          path: screenshots/baseline
          key: baselines-weekly-${{ github.repository }}

      - name: Run weekly scan
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: npm run scan:weekly

      - name: Save baseline cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: screenshots/baseline
          key: baselines-weekly-${{ github.repository }}-${{ github.run_id }}

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-screenshots-${{ github.run_number }}
          path: screenshots/
          retention-days: 14
